<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg { fill: #f8f5ee; }
      .panel { fill: #ffffff; stroke: #264653; stroke-width: 2; rx: 14; }
      .title { font: 700 26px 'IBM Plex Sans', Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 600 18px 'IBM Plex Sans', Arial, sans-serif; fill: #102a43; }
      .label { font: 500 16px 'IBM Plex Sans', Arial, sans-serif; fill: #223; }
      .small { font: 500 14px 'IBM Plex Sans', Arial, sans-serif; fill: #334; }
      .wire-power { stroke: #e63946; stroke-width: 4; fill: none; }
      .wire-gnd { stroke: #1d3557; stroke-width: 4; fill: none; }
      .wire-signal { stroke: #2a9d8f; stroke-width: 4; fill: none; }
      .wire-led { stroke: #f4a261; stroke-width: 4; fill: none; }
      .node { fill: #fff; stroke: #222; stroke-width: 2; }
      .chip { fill: #f1faee; stroke: #264653; stroke-width: 2; }
      .note { fill: #fff6d5; stroke: #c08a00; stroke-width: 1.5; rx: 8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#444"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="34" y="44">RPR220 Bare Sensor Wiring to ESP32 LOLIN32 Lite</text>

  <rect class="panel" x="36" y="80" width="460" height="620"/>
  <text class="subtitle" x="58" y="116">ESP32</text>

  <rect class="chip" x="90" y="150" width="350" height="510" rx="10"/>
  <text class="label" x="112" y="182">3V3</text>
  <circle class="node" cx="410" cy="176" r="6"/>

  <text class="label" x="112" y="252">GND</text>
  <circle class="node" cx="410" cy="246" r="6"/>

  <text class="label" x="112" y="332">GPIO18 (Pulse Input)</text>
  <circle class="node" cx="410" cy="326" r="6"/>

  <text class="label" x="112" y="412">GPIO19 (IR LED Enable)</text>
  <circle class="node" cx="410" cy="406" r="6"/>

  <text class="small" x="112" y="468">Firmware defaults GPIO19 = ON</text>
  <text class="small" x="112" y="492">(active-high with this wiring)</text>

  <rect class="panel" x="700" y="80" width="460" height="620"/>
  <text class="subtitle" x="722" y="116">RPR220 Bare Device + Passives</text>

  <rect class="chip" x="760" y="150" width="340" height="240" rx="10"/>
  <text class="label" x="780" y="184">IR LED Anode</text>
  <circle class="node" cx="1068" cy="178" r="6"/>
  <text class="label" x="780" y="232">IR LED Cathode</text>
  <circle class="node" cx="1068" cy="226" r="6"/>
  <text class="label" x="780" y="282">Phototransistor Collector</text>
  <circle class="node" cx="1068" cy="276" r="6"/>
  <text class="label" x="780" y="332">Phototransistor Emitter</text>
  <circle class="node" cx="1068" cy="326" r="6"/>

  <circle class="node" cx="860" cy="520" r="8"/>
  <text class="label" x="784" y="548">OUT Node</text>

  <rect class="note" x="760" y="580" width="360" height="86"/>
  <text class="small" x="778" y="608">Rseries (GPIO19 -> IR Anode): 150Ω to 220Ω</text>
  <text class="small" x="778" y="632">Pull-up (3V3 -> OUT): 10kΩ</text>
  <text class="small" x="778" y="656">Optional noise cap: 100nF from OUT to GND</text>

  <!-- LED drive path -->
  <path class="wire-led" d="M410 406 C540 406, 610 178, 1068 178"/>
  <text class="small" x="560" y="280">via 150Ω..220Ω resistor</text>

  <path class="wire-gnd" d="M1068 226 C1000 226, 940 246, 410 246"/>

  <!-- Phototransistor and OUT wiring -->
  <path class="wire-signal" d="M1068 276 C980 276, 930 500, 860 520"/>
  <path class="wire-gnd" d="M1068 326 C980 326, 950 246, 410 246"/>

  <path class="wire-signal" d="M860 520 C760 520, 690 326, 410 326"/>
  <path class="wire-power" d="M410 176 C690 176, 760 520, 860 520"/>
  <text class="small" x="600" y="168">10kΩ pull-up to 3V3</text>

  <text class="small" x="58" y="730">Legend: Red = 3V3, Blue = GND, Green = pulse/output node, Orange = IR LED drive.</text>
</svg>
